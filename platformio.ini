; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = SpotifyDiyThing
default_envs = cyd

[env]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	https://github.com/witnessmenow/spotify-api-arduino.git
	khoih-prog/ESP_DoubleResetDetector@^1.3.2
	bblanchon/ArduinoJson@^6.21.3
	bitbank2/JPEGDEC@^1.2.8
    wnatth3/WiFiManager@^2.0.16-rc.2
    https://github.com/witnessmenow/Seeed_Arduino_NFC.git
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
lib_ldf_mode = deep+

[common_cyd]
lib_deps = 
	${env.lib_deps}
	bodmer/TFT_eSPI@^2.5.33
build_flags = 
	-DYELLOW_DISPLAY
	-DNFC_ENABLED
	-DUSER_SETUP_LOADED
	-DILI9341_2_DRIVER
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	-DTFT_BACKLIGHT_OFF=LOW
	-DLOAD_GLCD
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DLOAD_FONT2
	-DLOAD_FONT4
	-DLOAD_FONT6
	-DLOAD_FONT7
	-DLOAD_FONT8
	-DLOAD_GFXFF
    -DUSE_HSPI_PORT

[env:cyd]
lib_deps = 
	${common_cyd.lib_deps}
build_flags = 
	${common_cyd.build_flags}
	-DTFT_INVERSION_OFF

[env:cyd2usb]
lib_deps = 
	${common_cyd.lib_deps}
build_flags = 
	${common_cyd.build_flags}
	-DTFT_INVERSION_ON

[env:trinity]
lib_deps = 
	${env.lib_deps}
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.9
	adafruit/Adafruit GFX Library@^1.11.9	
build_flags = 
	-DMATRIX_DISPLAY
	-DNFC_ENABLED

[env:ttgo-t-display]
platform = espressif32
board = ttgo-lora32-v1
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep
board_build.partitions = min_spiffs.csv
board_build.filesystem = spiffs
lib_deps = 
	${env.lib_deps}
	bodmer/TFT_eSPI@^2.5.33
	Button2@1.0.0
build_flags = 
	-D USER_SETUP_LOADED=1
	-DTTGO_TDISPLAY
	-include $PROJECT_LIBDEPS_DIR/$PIOENV/TFT_eSPI/User_Setups/Setup25_TTGO_T_Display.h
	-Os
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=135
	-DTFT_HEIGHT=240
	-DCGRAM_OFFSET=1
	-DTFT_MISO=-1
	-DTFT_MOSI=19
	-DTFT_SCLK=18
	-DTFT_CS=5
	-DTFT_DC=16
	-DTFT_RST=23
	-DTFT_BL=4
	-DTFT_BACKLIGHT_ON=1
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DLOAD_FONT6=1
	-DLOAD_FONT7=1
	-DLOAD_FONT8=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=6000000

; LILYGO T-Embed S3 CC1101 — 170x320 ST7789, rotary encoder (L=prev, R=next)
; Display: include official-style setup (pins + USE_HSPI_PORT for ESP32-S3).
[env:t-embed-s3-cc1101]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.variant = esp32s3
board_build.f_flash = 80000000L
board_build.flash_mode = qio
monitor_speed = 115200
lib_ldf_mode = deep
board_build.partitions = min_spiffs.csv
board_build.filesystem = spiffs
lib_deps = 
	${env.lib_deps}
	bodmer/TFT_eSPI@^2.5.33
	mathertel/RotaryEncoder@^1.5.3
	adafruit/Adafruit NeoPixel@^1.12.0
build_flags = 
	-DTEMBED_DISPLAY
	-DTEMBED_LED_BRIGHTNESS=10  # 0–255 (lower = dimmer)
	-include $PROJECT_DIR/DisplayConfig/Setup214_LilyGo_T_Embed_CC1101.h